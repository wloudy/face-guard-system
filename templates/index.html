<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Face Guard • AI Surveillance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0f2fe;
        }
        .bg-animation {
            position: fixed;
            inset: 0;
            background: linear-gradient(45deg, #0f172a, #1e2937, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradientShift 25s ease infinite;
            z-index: -2;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .tabs {
            position: relative;
            display: flex;
            justify-content: center;
            border-bottom: 2px solid #334155;
            margin-bottom: 2rem;
        }

        .tab-button {
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #94a3b8;
            transition: color 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .tab-button.active {
            color: white;
        }

        .slider {
            position: absolute;
            bottom: -2px;
            height: 4px;
            background: linear-gradient(to right, #10b981, #34d399);
            border-radius: 9999px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .camera-container {
            width: 100%;
            max-width: 560px;
            height: 420px;
            display: flex;
            flex-direction: column;
            border: 2px solid rgba(74, 222, 128, 0.6);
            border-radius: 20px;
            overflow: hidden;
            background: #111827;
            transition: all 0.3s ease;
        }
        .camera-container:hover {
            border-color: #4ade80;
        }

        .camera-header {
            background: #1f2937;
            padding: 12px 20px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .camera-stream {
            flex-grow: 1;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stream-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .no-camera {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            background: #1f2937;
            text-align: center;
        }

        .select-wrap {
            position: relative;
            width: 100%;
        }

        .camera-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 100%;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(51, 65, 85, 0.9);
            color: #e2e8f0;
            border-radius: 18px;
            padding: 12px 44px 12px 16px;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        .camera-select:hover {
            border-color: rgba(74, 222, 128, 0.55);
        }

        .camera-select:focus {
            border-color: rgba(74, 222, 128, 0.9);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.18), 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        .select-arrow {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            width: 30px;
            height: 30px;
            border-radius: 9999px;
            background: rgba(148, 163, 184, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }

        .select-arrow svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body class="min-h-screen relative">
    <div class="bg-animation"></div>

    <div class="relative z-10 max-w-7xl mx-auto p-6">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-emerald-400 via-cyan-400 to-blue-500 bg-clip-text text-transparent">
                <i class="fas fa-eye"></i> Face Guard
            </h1>
            <p class="text-slate-400 mt-2">Система видеомониторинга с распознаванием лиц</p>
        </div>

        <div class="tabs">
            <button onclick="switchTab(0)" id="tab-0" class="tab-button active">📹 Камеры</button>
            <button onclick="switchTab(1)" id="tab-1" class="tab-button">🛎 События</button>
            <div id="slider" class="slider"></div>
        </div>

        <div id="tab-content-0">
            <div class="grid grid-cols-1 lg:grid-cols-1 gap-8 justify-center" id="cameras-container"></div>
        </div>

        <div id="tab-content-1" class="hidden">
            <div id="events-container" class="space-y-6"></div>
        </div>
    </div>

    <div id="settings-panel" class="fixed bottom-6 right-6 bg-slate-900/95 backdrop-blur-xl rounded-3xl p-6 border border-slate-700 shadow-2xl w-80">
        <h2 class="text-xl font-semibold mb-5 flex items-center gap-3">
            <i class="fas fa-sliders-h text-emerald-400"></i> Настройки
        </h2>

        <div class="space-y-6 text-sm">
            <div>
                <div class="flex justify-between mb-2">
                    <span>Камера</span>
                    <span class="text-slate-500">выбор</span>
                </div>
                <div class="select-wrap">
                    <select id="camera-select" class="camera-select">
                        <option value="">Загрузка камер...</option>
                    </select>
                    <div class="select-arrow" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
            </div>
            <div>
                <div class="flex justify-between mb-2">
                    <span>Показывать камер</span>
                    <span class="text-slate-500">вид</span>
                </div>
                <div class="select-wrap">
                    <select id="camera-count-select" class="camera-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="4">4</option>
                        <option value="all">Все</option>
                    </select>
                    <div class="select-arrow" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
                <div class="text-xs text-slate-500 mt-2">
                    Чем больше камер, тем выше нагрузка на CPU/сеть.
                </div>
            </div>
            <div>
                <div class="flex justify-between mb-2">
                    <span>Scale Factor</span>
                    <span id="scale_val" class="font-mono">0.25</span>
                </div>
                <input type="range" id="scale_factor" min="0.1" max="0.5" step="0.05" value="0.25" class="w-full accent-emerald-500">
            </div>
            <div>
                <div class="flex justify-between mb-2">
                    <span>Tolerance</span>
                    <span id="tolerance_val" class="font-mono">0.55</span>
                </div>
                <input type="range" id="tolerance" min="0.3" max="0.7" step="0.01" value="0.55" class="w-full accent-emerald-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-1">Cooldown (сек)</label>
                    <input type="number" id="notify_cooldown" value="35" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-center">
                </div>
                <div>
                    <label class="block text-sm mb-1">Видео (сек)</label>
                    <input type="number" id="video_duration" value="6" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-center">
                </div>
            </div>
        </div>

        <button id="apply-btn"
                class="mt-6 w-full bg-emerald-600 hover:bg-emerald-700 py-3 rounded-2xl font-medium">
            Применить настройки
        </button>

        <button id="shutdown-btn"
                class="mt-3 w-full bg-red-600/90 hover:bg-red-600 py-3 rounded-2xl font-medium border border-red-400/20">
            Остановить программу
        </button>
    </div>

    <script>
        const socket = io();
        let currentTab = 0;
        const slider = document.getElementById('slider');

        function switchTab(tab) {
            currentTab = tab;

            document.getElementById('tab-content-0').classList.toggle('hidden', tab !== 0);
            document.getElementById('tab-content-1').classList.toggle('hidden', tab !== 1);

            document.getElementById('tab-0').classList.toggle('active', tab === 0);
            document.getElementById('tab-1').classList.toggle('active', tab === 1);

            const activeButton = document.getElementById(`tab-${tab}`);
            const rect = activeButton.getBoundingClientRect();
            const tabsRect = activeButton.parentElement.getBoundingClientRect();

            slider.style.left = `${rect.left - tabsRect.left}px`;
            slider.style.width = `${rect.width}px`;

            document.getElementById('settings-panel').style.display = (tab === 0) ? 'block' : 'none';
        }

        document.getElementById('apply-btn').addEventListener('click', () => {
            const payload = {
                scale_factor: parseFloat(document.getElementById('scale_factor').value),
                tolerance: parseFloat(document.getElementById('tolerance').value),
                notify_cooldown: parseInt(document.getElementById('notify_cooldown').value),
                video_duration: parseInt(document.getElementById('video_duration').value)
            };

            fetch('/update_settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                const btn = document.getElementById('apply-btn');
                const originalText = btn.textContent;
                btn.textContent = '✓ Применено!';
                setTimeout(() => btn.textContent = originalText, 2000);
            }).catch(err => console.error('Ошибка применения настроек:', err));
        });

        document.getElementById('shutdown-btn').addEventListener('click', async () => {
            const ok = confirm('Остановить Face Guard? Камеры и сайт перестанут работать.');
            if (!ok) return;

            const btn = document.getElementById('shutdown-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Останавливаю...';

            try {
                const r = await fetch('/api/shutdown', { method: 'POST' });
                const data = await r.json().catch(() => ({}));
                if (!r.ok) {
                    alert(data.message || 'Не удалось остановить приложение');
                    btn.disabled = false;
                    btn.textContent = originalText;
                    return;
                }

                btn.textContent = 'Выключено';
                setTimeout(() => location.reload(), 1500);
            } catch (e) {
                console.error('Ошибка shutdown:', e);
                btn.disabled = false;
                btn.textContent = originalText;
                alert('Ошибка сети при выключении');
            }
        });

        function pickCamerasForGrid(cameras, count, selectedId) {
            if (!Array.isArray(cameras) || cameras.length === 0) return [];

            const enabled = cameras.filter(c => c.enabled);
            const disabled = cameras.filter(c => !c.enabled);
            const ordered = enabled.concat(disabled);

            if (count === 1) {
                const chosen = ordered.find(c => c.id === selectedId) || ordered[0];
                return chosen ? [chosen] : [];
            }

            if (count === 'all') return ordered;
            const n = Math.max(1, Number(count));
            if (!Number.isFinite(n)) return ordered;
            return ordered.slice(0, n);
        }

        function applyGridLayout(count) {
            const container = document.getElementById('cameras-container');
            container.className = 'grid gap-8 justify-center';

            if (count === 1) {
                container.classList.add('grid-cols-1', 'lg:grid-cols-1');
                return;
            }

            if (count === 2) {
                container.classList.add('grid-cols-1', 'lg:grid-cols-2');
                return;
            }

            // 4+ или all
            container.classList.add('grid-cols-1', 'md:grid-cols-2', 'xl:grid-cols-2');
        }

        function createCameras(cameras, selectedId, count) {
            const container = document.getElementById('cameras-container');
            container.innerHTML = '';

            const picked = pickCamerasForGrid(cameras, count, selectedId);
            applyGridLayout(count);

            if (!picked.length) {
                container.innerHTML = `
                    <div class="no-camera rounded-3xl border border-slate-700">
                        <i class="fas fa-video-slash text-6xl mb-6 text-slate-500"></i>
                        <p class="text-slate-400 font-medium text-lg">Камеры не найдены</p>
                        <p class="text-slate-500">Проверьте подключение и права доступа</p>
                    </div>
                `;
                return;
            }

            picked.forEach(cam => {
                const id = cam.id;
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="camera-container" id="frame-${id}">
                        <div class="camera-header">
                            <div class="flex items-center gap-3">
                                <span class="text-emerald-400">●</span>
                                <span class="font-semibold">${cam.name}</span>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="toggle-${id}" ${cam.enabled ? 'checked' : ''} onchange="toggleCamera(${id})" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-700 rounded-full peer peer-checked:bg-emerald-500"></div>
                                <div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full transition-all peer-checked:translate-x-5"></div>
                            </label>
                        </div>
                        <div class="camera-stream" id="stream-container-${id}">
                            ${cam.enabled ? `<img src="/video_feed/${id}" class="stream-img" id="stream-${id}">` : `
                                <div class="no-camera">
                                    <i class="fas fa-video-slash text-6xl mb-6 text-slate-500"></i>
                                    <p class="text-slate-400 font-medium text-lg">Камера отключена</p>
                                    <p class="text-slate-500">Нет сигнала</p>
                                </div>
                            `}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.toggleCamera = function(camId) {
            const enabled = document.getElementById(`toggle-${camId}`).checked;
            const container = document.getElementById(`stream-container-${camId}`);

            if (enabled) {
                container.innerHTML = `<img src="/video_feed/${camId}" class="stream-img" id="stream-${camId}">`;
            } else {
                container.innerHTML = `
                    <div class="no-camera">
                        <i class="fas fa-video-slash text-6xl mb-6 text-slate-500"></i>
                        <p class="text-slate-400 font-medium text-lg">Камера отключена</p>
                        <p class="text-slate-500">Нет сигнала</p>
                    </div>
                `;
            }

            fetch('/update_settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ camera_enabled: { [camId]: enabled } })
            });
        };

        socket.on('new_event', (data) => {
            addEventToPage(data);
        });

        function addEventToPage(event) {
            const container = document.getElementById('events-container');
            const html = `
                <div class="event-card bg-slate-900 rounded-3xl p-6 border border-slate-700">
                    <div class="flex justify-between">
                        <div>
                            <div class="text-emerald-400 font-mono">${event.timestamp}</div>
                            <div class="text-xl font-semibold mt-1">${event.cam_name}</div>
                            <div class="text-red-400">${event.message}</div>
                        </div>
                    </div>
                    <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <p class="text-sm text-slate-400 mb-3">Фото момента</p>
                            <a href="/alerts/${event.photo}" target="_blank">
                                <img src="/alerts/${event.photo}" class="rounded-2xl w-full border border-slate-700">
                            </a>
                        </div>
                        <div>
                            <p class="text-sm text-slate-400 mb-3">Видео тревоги</p>
                            <a href="/alerts/${event.video}" target="_blank"
                               class="block bg-slate-800 hover:bg-slate-700 p-8 rounded-2xl text-center">
                                <i class="fas fa-download text-4xl mb-4 text-emerald-400"></i>
                                <p class="font-medium">Скачать видео</p>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', html);
        }

        let camerasCache = [];

        function populateCameraSelect(cameras) {
            const select = document.getElementById('camera-select');
            select.innerHTML = '';
            cameras.forEach(cam => {
                const opt = document.createElement('option');
                opt.value = String(cam.id);
                opt.textContent = cam.name;
                select.appendChild(opt);
            });
        }

        function getSavedCameraCount() {
            const raw = localStorage.getItem('camera_grid_count');
            if (!raw) return 1;
            if (raw === 'all') return 'all';
            const n = Number(raw);
            return Number.isFinite(n) ? n : 1;
        }

        function saveCameraCount(count) {
            localStorage.setItem('camera_grid_count', String(count));
        }

        function getSavedCameraId() {
            const raw = localStorage.getItem('selected_camera_id');
            if (raw === null || raw === '') return null;
            const n = Number(raw);
            return Number.isFinite(n) ? n : null;
        }

        function saveCameraId(camId) {
            localStorage.setItem('selected_camera_id', String(camId));
        }

        function updateCameraSelectEnabledState(count) {
            const camSelect = document.getElementById('camera-select');
            const hint = camSelect?.parentElement?.parentElement?.querySelector('.text-xs');
            const isSingle = (count === 1);

            camSelect.disabled = !isSingle;
            camSelect.style.opacity = isSingle ? '1' : '0.55';
            camSelect.style.cursor = isSingle ? 'pointer' : 'not-allowed';

            if (hint) hint.remove();
            if (!isSingle) {
                const el = document.createElement('div');
                el.className = 'text-xs text-slate-500 mt-2';
                el.textContent = 'Выбор камеры доступен только при отображении 1 камеры.';
                camSelect.parentElement.parentElement.appendChild(el);
            }
        }

        function renderSelectedCamera() {
            const select = document.getElementById('camera-select');
            const camId = Number(select.value);
            if (!Number.isFinite(camId)) return;
            saveCameraId(camId);
            const count = getSavedCameraCount();
            createCameras(camerasCache, camId, count);
        }

        document.getElementById('camera-select').addEventListener('change', renderSelectedCamera);
        document.getElementById('camera-count-select').addEventListener('change', () => {
            const raw = document.getElementById('camera-count-select').value;
            const count = (raw === 'all') ? 'all' : Number(raw);
            saveCameraCount(raw);
            updateCameraSelectEnabledState(count);

            const savedId = getSavedCameraId();
            const camId = (savedId !== null && camerasCache.some(c => c.id === savedId))
                ? savedId
                : (camerasCache[0]?.id ?? 0);

            createCameras(camerasCache, camId, count);
        });

        fetch('/api/cameras')
            .then(r => r.json())
            .then(cameras => {
                camerasCache = cameras || [];
                populateCameraSelect(camerasCache);

                const savedCount = getSavedCameraCount();
                document.getElementById('camera-count-select').value = (savedCount === 'all') ? 'all' : String(savedCount);
                updateCameraSelectEnabledState(savedCount);

                const saved = getSavedCameraId();
                const initial = (saved !== null && camerasCache.some(c => c.id === saved))
                    ? saved
                    : (camerasCache[0]?.id ?? 0);

                document.getElementById('camera-select').value = String(initial);
                createCameras(camerasCache, initial, savedCount);
            })
            .catch(err => {
                console.error('Ошибка загрузки списка камер:', err);
                const select = document.getElementById('camera-select');
                select.innerHTML = '<option value="">Ошибка</option>';
            });

        switchTab(0);
    </script>
</body>
</html>
