<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>События — Face Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e0f2fe; }
        .event-card { transition: all 0.3s ease; }
        .event-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold flex items-center gap-3">
                <i class="fas fa-bell text-red-400"></i> События
            </h1>
            <a href="/" class="text-emerald-400 hover:text-emerald-300 flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> На главную
            </a>
        </div>

        <div id="events-container" class="space-y-6">
        </div>
    </div>

    <script>
        const socket = io();

        function addEvent(event) {
            const container = document.getElementById('events-container');

            const html = `
                <div class="event-card bg-slate-900 rounded-3xl p-6 border border-slate-700">
                    <div class="flex justify-between">
                        <div>
                            <div class="text-emerald-400 font-mono">${event.timestamp}</div>
                            <div class="text-xl font-semibold mt-1">${event.cam_name}</div>
                            <div class="text-red-400">${event.message}</div>
                        </div>
                    </div>

                    <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Фото -->
                        <div>
                            <p class="text-sm text-slate-400 mb-3">Фото момента</p>
                            <a href="/alerts/${event.photo}" target="_blank">
                                <img src="/alerts/${event.photo}"
                                     class="rounded-2xl w-full border border-slate-700 hover:border-red-400">
                            </a>
                        </div>

                        <div>
                            <p class="text-sm text-slate-400 mb-3">Видео тревоги (качественное)</p>
                            <a href="/alerts/${event.video}"
                               target="_blank"
                               class="block bg-slate-800 hover:bg-slate-700 transition-colors p-6 rounded-2xl text-center">
                                <i class="fas fa-download text-3xl mb-3 text-emerald-400"></i>
                                <p class="font-medium">Скачать видео</p>
                                <p class="text-xs text-slate-500 mt-1">Нажмите, чтобы скачать полную версию</p>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', html);
        }

        socket.on('new_event', (data) => {
            console.log("Новое событие:", data);
            addEvent(data);
        });

        window.onload = function() {
            fetch('/api/events')
                .then(response => response.json())
                .then(events => {
                    events.forEach(event => addEvent(event));
                })
                .catch(err => console.error("Ошибка загрузки событий:", err));
        };
    </script>
</body>
</html>
